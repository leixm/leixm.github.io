<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>leixm</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.12);
      --text: #f8fafc;
      --muted: rgba(248,250,252,0.72);
      --blue: #60a5fa;
      --shadow: 0 24px 60px rgba(0,0,0,0.28);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(96,165,250,0.22), transparent 30%),
        linear-gradient(180deg, #111827 0%, var(--bg) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 820px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 32px;
    }
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      font-size: 13px;
    }
    h1 {
      margin: 18px 0 12px;
      font-size: 46px;
      line-height: 1.08;
    }
    .lead {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
      max-width: 720px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      color: white;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }
    a.btn.primary {
      background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      border-color: rgba(96,165,250,0.4);
    }
    .note {
      margin-top: 22px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    @media (max-width: 768px) {
      .card { padding: 22px; }
      h1 { font-size: 34px; }
      .lead { font-size: 15px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">leixm.github.io</span>
    <h1>欢迎来到 leixm 的主页</h1>
    <div class="lead">
      这里后续会逐步补充个人主页内容。当前已经上线的内容，是一份持续更新的加密货币市场日报，你可以从下面的入口进入。
    </div>
    <div class="actions">
      <a class="btn primary" href="/fin-report/reports/2026-04-26/">查看 04-26 最新日报</a>
      <a class="btn" href="/fin-report/">进入日报归档</a>
    </div>
    <div class="note">
      当前最新一期为 <strong>2026-04-26</strong>，加密货币日报站点位于 <strong>/fin-report/</strong> 路径下，后续个人主页与其他内容也可以继续在根站点扩展。
    </div>
  </main>
</body>
</html>
